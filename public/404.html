<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AHP Basic</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect for HashRouter
      var l = window.location;
      var path = l.pathname;
      var search = l.search;
      var hash = l.hash;
      if (path === '/' || path === '/index.html') {
        l.replace('/' + search + hash);
      } else {
        l.replace('/#' + path + (search ? '?' + search.slice(1) : ''));
      }
    </script>
  </head>
  <body></body>
</html>
